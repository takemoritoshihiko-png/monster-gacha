// BUBBLE POP GAME (バブルポップ)
// ============================================================
function BubbleGame({ onDone }) {
  const [phase, setPhase] = useState("ready");
  const [bubbles, setBubbles] = useState([]);
  const [startTime, setStartTime] = useState(null);
  const [playTime, setPlayTime] = useState(null);
  const [elapsed, setElapsed] = useState(0);
  const [growId, setGrowId] = useState(null);
  const timerRef = useRef(null);

  const BUBBLE_COLORS_SAFE = ['#93c5fd','#60a5fa','#3b82f6','#2563eb','#1d4ed8','#1e40af'];
  const BUBBLE_COLORS_DANGER = ['#fbbf24','#f59e0b','#ef4444','#dc2626','#b91c1c','#991b1b'];
  const bubbleColor = (taps) => taps <= 4 ? BUBBLE_COLORS_SAFE[Math.min(taps, 5)] : BUBBLE_COLORS_DANGER[Math.min(taps - 5, 5)];
  const bubbleSize = (taps) => 50 + taps * 8;

  const startGame = () => {
    setPhase("play");
    setBubbles(Array.from({ length: 9 }, (_, i) => ({ id: i, taps: 0, popped: false })));
    const now = Date.now();
    setStartTime(now); setElapsed(0); setPlayTime(null);
    bgm.playLoop(BUBBLE_BGM, 110);
    timerRef.current = setInterval(() => setElapsed((Date.now() - now) / 1000), 100);
  };

  const finishGame = () => {
    clearInterval(timerRef.current);
    bgm.stop(); sfx('gameFinish');
    setPlayTime(((Date.now() - startTime) / 1000).toFixed(1));
    setPhase("done");
  };

  useEffect(() => () => { clearInterval(timerRef.current); bgm.stop(); }, []);

  const handleBubbleTap = (id) => {
    if (phase !== "play") return;
    setBubbles(prev => {
      const next = prev.map(b => ({ ...b }));
      const b = next[id];
      if (b.popped) return prev;
      b.taps++;
      const chance = b.taps <= 5 ? 0 : (b.taps - 5) * 0.08;
      if (Math.random() < chance) {
        b.popped = true;
        sfx('wrong');
      } else {
        if (b.taps <= 5) {
          playNote(300 + b.taps * 80, 0.06, 'sine', 0.06);
        } else {
          playNote(400 + b.taps * 60, 0.08, 'triangle', 0.08);
          playNote(200, 0.15, 'sine', 0.03);
        }
      }
      next[id] = b;
      return next;
    });
    setGrowId(id);
    setTimeout(() => setGrowId(null), 150);
  };

  const currentScore = useMemo(() =>
    bubbles.reduce((s, b) => s + (b.popped ? 0 : (BUBBLE_REWARDS[Math.min(b.taps, BUBBLE_REWARDS.length - 1)] || 0)), 0),
  [bubbles]);

  const poppedCount = bubbles.filter(b => b.popped).length;
  const maxTaps = bubbles.length > 0 ? Math.max(...bubbles.map(b => b.taps)) : 0;

  useEffect(() => { if (phase === "done") { const t = setTimeout(() => onDone(currentScore), 2000); return () => clearTimeout(t); } }, [phase]);

  return (
    <div style={{ textAlign: 'center' }}>
      <div className="st" style={{ justifyContent: 'center' }}>🫧 バブルポップ</div>
      {phase === "ready" && (
        <>
          <p style={{ fontSize: 12, opacity: 0.5, margin: '16px 0' }}>
            9個のバブルをタップで膨らませろ！<br/>
            4回までは安全。5回目から破裂リスク！<br/>
            大きいほど高報酬。でも破裂したら0点！
          </p>
          <div style={{ fontSize: 10, opacity: 0.4, margin: '8px 0', lineHeight: 1.8 }}>
            ×4=🪙16 ／ ×6=🪙40 ／ ×8=🪙88 ／ ×10=🪙176
          </div>
          <button className="btn bp" onClick={startGame}>スタート！</button>
        </>
      )}
      {phase === "play" && (
        <div>
          <div className="sr">
            <div className="sb">⏱️ {elapsed.toFixed(1)}s</div>
            <div className="sb">🪙 {currentScore}</div>
            <div className="sb">💥 {poppedCount}</div>
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 100px)', gap: 12, justifyContent: 'center', marginTop: 16, placeItems: 'center' }}>
            {bubbles.map(b => {
              const sz = b.popped ? 50 : bubbleSize(b.taps);
              const col = bubbleColor(b.taps);
              return (
                <div key={b.id} style={{ width: 100, height: 100, display: 'flex', alignItems: 'center', justifyContent: 'center', overflow: 'visible' }}>
                  <div onClick={() => handleBubbleTap(b.id)}
                    className={b.popped ? 'bubble-pop' : (growId === b.id ? 'bubble-grow' : '') + (b.taps >= 5 && !b.popped ? ' bubble-danger' : '')}
                    style={{
                      width: sz, height: sz, borderRadius: '50%',
                      display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
                      cursor: b.popped ? 'default' : 'pointer',
                      transition: 'width 0.15s, height 0.15s, background 0.15s',
                      position: 'relative',
                      ...(b.popped ? {
                        background: 'rgba(255,255,255,0.05)',
                        border: '2px dashed rgba(255,255,255,0.1)',
                        opacity: 0.3,
                      } : {
                        background: `radial-gradient(circle at 35% 35%, ${col}80, ${col})`,
                        border: `2px solid ${col}`,
                        boxShadow: `0 0 ${8 + b.taps * 3}px ${col}50`,
                      }),
                    }}>
                    {b.popped ? (
                      <span style={{ fontSize: 20 }}>💥</span>
                    ) : (
                      <>
                        <span style={{ fontSize: 12 + b.taps * 2 }}>🫧</span>
                        <span style={{ fontSize: 10, fontWeight: 900, fontFamily: "'Orbitron',sans-serif",
                          color: b.taps >= 5 ? '#fff' : 'rgba(255,255,255,0.7)' }}>×{b.taps}</span>
                        {b.taps >= 5 && (
                          <span style={{ fontSize: 8, color: '#fbbf24', marginTop: 1 }}>🪙{BUBBLE_REWARDS[Math.min(b.taps, BUBBLE_REWARDS.length - 1)]}</span>
                        )}
                      </>
                    )}
                    {b.taps >= 5 && !b.popped && (
                      <div style={{ position: 'absolute', bottom: -14, fontSize: 8, color: b.taps >= 9 ? '#ef4444' : '#fbbf24', fontWeight: 700 }}>
                        ⚠️{(b.taps - 4) * 8}%
                      </div>
                    )}
                  </div>
                </div>
              );
            })}
          </div>
          <button className="btn bp" onClick={finishGame}
            style={{ width: '100%', marginTop: 20, fontSize: 16, padding: '14px 0',
              background: 'linear-gradient(135deg, #4ade80, #22c55e)' }}>
            🎯 スコア確定！（現在: 🪙{currentScore}）
          </button>
        </div>
      )}
      {phase === "done" && (
        <>
          <div style={{ fontSize: 44, margin: '16px 0' }}>🫧</div>
          <p style={{ fontSize: 20, fontWeight: 900, color: '#fbbf24' }}>🪙 {currentScore} コイン獲得！</p>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 6, maxWidth: 280, margin: '12px auto' }}>
            {bubbles.map(b => (
              <div key={b.id} style={{ padding: '6px 4px', borderRadius: 8,
                background: b.popped ? 'rgba(239,68,68,0.1)' : 'rgba(74,222,128,0.1)',
                border: `1px solid ${b.popped ? 'rgba(239,68,68,0.2)' : 'rgba(74,222,128,0.2)'}`,
                fontSize: 11, textAlign: 'center' }}>
                {b.popped ? <span>💥 0</span> : <span>🫧×{b.taps}=🪙{BUBBLE_REWARDS[Math.min(b.taps, BUBBLE_REWARDS.length - 1)]}</span>}
              </div>
            ))}
          </div>
          <p style={{ fontSize: 12, opacity: 0.5, marginTop: 8 }}>
            生存: {9 - poppedCount}/9 ／ 最大膨らみ: ×{maxTaps} ／ 時間: {playTime}秒
          </p>
        </>
      )}
    </div>
  );
}

// ============================================================
// GEM CATCH GAME (ジュエルキャッチ)
// ============================================================
function GemCatchGame({ onDone }) {
  const [phase, setPhase] = useState("ready");
  const [earned, setEarned] = useState(0);
  const [timeLeft, setTimeLeft] = useState(20);
  const [stats, setStats] = useState({ perfect: 0, good: 0, miss: 0 });
  const [combo, setCombo] = useState(0);
  const [maxCombo, setMaxCombo] = useState(0);
  const [floats, setFloats] = useState([]);

  const gemsRef = useRef([]);
  const earnedRef = useRef(0);
  const statsRef = useRef({ perfect: 0, good: 0, miss: 0 });
  const comboRef = useRef(0);
  const maxComboRef = useRef(0);
  const rafRef = useRef(null);
  const startRef = useRef(null);
  const spawnRef = useRef(null);
  const fid = useRef(0);
  const canvasRef = useRef(null);
  const lastFrameRef = useRef(0);

  const LANES = 3;
  const GAME_H = 380;
  const HIT_Y = GAME_H - 100;
  const PERFECT_RANGE = 20;
  const GOOD_RANGE = 44;
  const PERFECT_COIN = 8;
  const GOOD_COIN = 4;
  const DURATION = 20;

  // Gem colors for bright glow
  const GEM_DATA = [
    { icon: '💎', glow: '#60a5fa' },
    { icon: '🔴', glow: '#f87171' },
    { icon: '🔵', glow: '#3b82f6' },
    { icon: '💚', glow: '#4ade80' },
    { icon: '🟣', glow: '#c084fc' },
    { icon: '✨', glow: '#fbbf24' },
    { icon: '💫', glow: '#f472b6' },
  ];

  const startGame = () => {
    setPhase("play"); setEarned(0); setTimeLeft(DURATION); setCombo(0); setMaxCombo(0);
    setStats({ perfect: 0, good: 0, miss: 0 });
    earnedRef.current = 0; statsRef.current = { perfect: 0, good: 0, miss: 0 };
    comboRef.current = 0; maxComboRef.current = 0;
    gemsRef.current = []; lastFrameRef.current = Date.now();
    startRef.current = Date.now();
    bgm.playLoop(GEM_BGM, 130);

    let beatCount = 0;
    const beatMs = 60000 / 130;
    const spawn = () => {
      if (!startRef.current) return;
      const elapsed = (Date.now() - startRef.current) / 1000;
      if (elapsed > DURATION - 1.5) return;

      const phase = elapsed / DURATION; // 0→1 progress
      const difficulty = Math.min(phase * 1.5, 1); // ramp up

      // Speed: huge variation. Slow=80, fast=380. More fast ones later.
      const baseMin = 80 + difficulty * 60;
      const baseMax = 200 + difficulty * 180;
      const speed = baseMin + Math.random() * (baseMax - baseMin);

      // Choose lanes - sometimes spawn 2 or 3 simultaneously
      const lanes = [Math.floor(Math.random() * LANES)];
      if (difficulty > 0.3 && Math.random() < 0.25 + difficulty * 0.2) {
        // Add a second lane (different from first)
        let l2;
        do { l2 = Math.floor(Math.random() * LANES); } while (l2 === lanes[0]);
        lanes.push(l2);
      }
      if (difficulty > 0.7 && Math.random() < 0.1) {
        // Rare triple spawn
        const missing = [0, 1, 2].filter(l => !lanes.includes(l));
        if (missing.length > 0) lanes.push(missing[0]);
      }

      lanes.forEach(lane => {
        const gd = GEM_DATA[Math.floor(Math.random() * GEM_DATA.length)];
        // Each gem in a multi-spawn can have different speed
        const gemSpeed = lanes.length > 1 ? speed * (0.7 + Math.random() * 0.6) : speed;
        gemsRef.current.push({
          id: ++fid.current, lane, y: -30, speed: gemSpeed,
          icon: gd.icon, glow: gd.glow, size: 30 + Math.random() * 6,
          hit: false, missed: false
        });
      });

      beatCount++;
      // Rhythm variation: skip, double, normal
      let nextDelay;
      if (beatCount % 8 === 0) nextDelay = beatMs * 0.35; // double tap
      else if (beatCount % 5 === 3) nextDelay = beatMs * 1.4; // breath
      else if (beatCount % 3 === 0 && difficulty > 0.5) nextDelay = beatMs * 0.6; // fast section
      else nextDelay = beatMs * (0.8 + Math.random() * 0.4);
      spawnRef.current = setTimeout(spawn, nextDelay);
    };
    spawnRef.current = setTimeout(spawn, 400);

    // Game loop
    const loop = () => {
      const now = Date.now();
      const dt = Math.min((now - lastFrameRef.current) / 1000, 0.05);
      lastFrameRef.current = now;
      const elapsed = (now - startRef.current) / 1000;
      const rem = Math.max(0, DURATION - elapsed);
      setTimeLeft(rem);

      // Update gems
      gemsRef.current.forEach(g => {
        if (!g.hit && !g.missed) g.y += g.speed * dt;
        if (!g.hit && !g.missed && g.y > HIT_Y + GOOD_RANGE + 25) {
          g.missed = true;
          statsRef.current.miss++;
          comboRef.current = 0;
          setCombo(0);
          setStats({ ...statsRef.current });
        }
      });
      gemsRef.current = gemsRef.current.filter(g => !(g.missed && g.y > GAME_H + 40) && !(g.hit && g.y < -50));

      // Draw
      const cvs = canvasRef.current;
      if (cvs) {
        const ctx = cvs.getContext('2d');
        const w = cvs.width, h = cvs.height;
        ctx.clearRect(0, 0, w, h);
        const lw = w / LANES;

        // Lane backgrounds (subtle)
        for (let i = 0; i < LANES; i++) {
          ctx.fillStyle = i % 2 === 0 ? 'rgba(255,255,255,0.015)' : 'rgba(255,255,255,0.005)';
          ctx.fillRect(i * lw, 0, lw, h);
        }

        // Hit zone glow
        const grad = ctx.createLinearGradient(0, HIT_Y - 30, 0, HIT_Y + 30);
        grad.addColorStop(0, 'rgba(167,139,250,0)');
        grad.addColorStop(0.4, 'rgba(167,139,250,0.12)');
        grad.addColorStop(0.5, 'rgba(167,139,250,0.18)');
        grad.addColorStop(0.6, 'rgba(167,139,250,0.12)');
        grad.addColorStop(1, 'rgba(167,139,250,0)');
        ctx.fillStyle = grad;
        ctx.fillRect(0, HIT_Y - 30, w, 60);

        // Hit line
        ctx.strokeStyle = 'rgba(167,139,250,0.7)';
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(0, HIT_Y); ctx.lineTo(w, HIT_Y); ctx.stroke();

        // Lane dividers
        for (let i = 1; i < LANES; i++) {
          ctx.strokeStyle = 'rgba(255,255,255,0.06)';
          ctx.lineWidth = 1;
          ctx.beginPath(); ctx.moveTo(i * lw, 0); ctx.lineTo(i * lw, h); ctx.stroke();
        }

        // Gems with glow
        gemsRef.current.forEach(g => {
          if (g.hit) return;
          const x = (g.lane + 0.5) * lw;
          const alpha = g.missed ? 0.15 : 1;

          // Glow circle
          if (!g.missed) {
            ctx.save();
            ctx.globalAlpha = 0.35;
            ctx.shadowColor = g.glow;
            ctx.shadowBlur = 18;
            ctx.beginPath();
            ctx.arc(x, g.y, 14, 0, Math.PI * 2);
            ctx.fillStyle = g.glow;
            ctx.fill();
            ctx.restore();
          }

          // Gem emoji
          ctx.globalAlpha = alpha;
          ctx.font = `${g.size}px serif`;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(g.icon, x, g.y);
          ctx.globalAlpha = 1;
        });

        // Lane tap indicators
        for (let i = 0; i < LANES; i++) {
          ctx.fillStyle = 'rgba(167,139,250,0.15)';
          ctx.beginPath();
          ctx.arc((i + 0.5) * lw, HIT_Y, 18, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = 'rgba(167,139,250,0.3)';
          ctx.lineWidth = 1;
          ctx.stroke();
        }
      }

      if (rem > 0) {
        rafRef.current = requestAnimationFrame(loop);
      } else {
        bgm.stop(); sfx('gameFinish');
        setPhase("done");
        setEarned(earnedRef.current);
        setStats({ ...statsRef.current });
        setMaxCombo(maxComboRef.current);
      }
    };
    rafRef.current = requestAnimationFrame(loop);
  };

  // Process a tap at a specific X position on the canvas
  const phaseRef = useRef("ready");
  phaseRef.current = phase;

  const processTapAtX = useCallback((clientX) => {
    if (phaseRef.current !== "play") return;
    const cvs = canvasRef.current;
    if (!cvs) return;
    const rect = cvs.getBoundingClientRect();
    const scaleX = cvs.width / rect.width;
    const tapX = (clientX - rect.left) * scaleX;
    const tapLane = Math.max(0, Math.min(Math.floor(tapX / (cvs.width / LANES)), LANES - 1));

    let closest = null, closestDist = Infinity;
    gemsRef.current.forEach(g => {
      if (g.hit || g.missed || g.lane !== tapLane) return;
      const dist = Math.abs(g.y - HIT_Y);
      if (dist < GOOD_RANGE + 10 && dist < closestDist) { closest = g; closestDist = dist; }
    });
    if (!closest) return;
    closest.hit = true;

    let coins = 0, label = '', color = '';
    if (closestDist <= PERFECT_RANGE) {
      coins = PERFECT_COIN; label = 'PERFECT'; color = '#fbbf24';
      statsRef.current.perfect++;
      playNote(523, 0.08, 'sine', 0.12); playNote(784, 0.12, 'sine', 0.1, 0.04);
    } else {
      coins = GOOD_COIN; label = 'GOOD'; color = '#a78bfa';
      statsRef.current.good++;
      playNote(440, 0.08, 'sine', 0.08);
    }

    comboRef.current++;
    if (comboRef.current > maxComboRef.current) maxComboRef.current = comboRef.current;
    // 5コンボから+5コインボーナス
    if (comboRef.current >= 5) { coins += 5; }

    earnedRef.current += coins;
    setEarned(earnedRef.current);
    setCombo(comboRef.current);
    setStats({ ...statsRef.current });

    const id = ++fid.current;
    const fx = (tapLane + 0.5) * (100 / LANES);
    label += ' +' + coins;
    if (comboRef.current >= 10) label += '🔥';
    else if (comboRef.current >= 5) label += '✨';
    setFloats(p => [...p, { id, label, color, x: fx }]);
    setTimeout(() => setFloats(p => p.filter(f => f.id !== id)), 600);
  }, []);

  // Handle click (mouse/desktop)
  const handleTap = useCallback((e) => {
    processTapAtX(e.clientX);
  }, [processTapAtX]);

  // Handle touch (mobile) - use changedTouches for new touches only
  const handleTouchStart = useCallback((e) => {
    e.preventDefault();
    const touches = e.changedTouches || e.touches;
    for (let i = 0; i < touches.length; i++) {
      processTapAtX(touches[i].clientX);
    }
  }, [processTapAtX]);

  useEffect(() => () => {
    cancelAnimationFrame(rafRef.current);
    clearTimeout(spawnRef.current);
    bgm.stop();
  }, []);
  useEffect(() => { if (phase === "done") { const t = setTimeout(() => onDone(earned), 1500); return () => clearTimeout(t); } }, [phase]);

  return (
    <div style={{ textAlign: 'center' }}>
      <div className="st" style={{ justifyContent: 'center' }}>💎 ジュエルキャッチ</div>
      {phase === "ready" && (
        <>
          <p style={{ fontSize: 12, opacity: 0.5, margin: '16px 0' }}>
            落ちてくる宝石をリズムよくキャッチ！20秒<br/>
            PERFECT = 🪙8 ／ GOOD = 🪙4 ／ 5コンボから+5ボーナス
          </p>
          <button className="btn bp" onClick={startGame}>スタート！</button>
        </>
      )}
      {phase === "play" && (
        <div style={{ position: 'relative' }}>
          <div className="sr">
            <div className="sb">⏱️ {timeLeft.toFixed(1)}s</div>
            <div className="sb">🪙 {earned}</div>
            <div className="sb" style={{ color: combo >= 15 ? '#fbbf24' : combo >= 10 ? '#f472b6' : combo >= 5 ? '#ec4899' : '#a78bfa' }}>
              {combo > 0 ? `🔥${combo}` : '-'}
            </div>
          </div>
          <div className="tb"><div className="tf" style={{ width: `${(timeLeft / DURATION) * 100}%` }} /></div>
          <div style={{ position: 'relative', marginTop: 8, display: 'inline-block' }}>
            <canvas ref={canvasRef} width={300} height={GAME_H}
              style={{ borderRadius: 14, background: 'rgba(6,6,15,0.85)', border: '1px solid rgba(167,139,250,0.2)', touchAction: 'none', maxWidth: '100%', marginBottom: 20 }}
              onClick={handleTap} onTouchStart={handleTouchStart} />
            {floats.map(f => (
              <div key={f.id} className="ft" style={{ color: f.color, left: `${f.x}%`, top: '70%', fontSize: 12, fontWeight: 900 }}>{f.label}</div>
            ))}
          </div>
        </div>
      )}
      {phase === "done" && (
        <>
          <div style={{ fontSize: 44, margin: '16px 0' }}>💎</div>
          <p style={{ fontSize: 20, fontWeight: 900, color: '#fbbf24' }}>🪙 {earned} コイン獲得！</p>
          <div style={{ display: 'flex', justifyContent: 'center', gap: 16, margin: '12px 0', fontSize: 13 }}>
            <div><span style={{ color: '#fbbf24', fontWeight: 700 }}>PERFECT</span><br/>{stats.perfect}</div>
            <div><span style={{ color: '#a78bfa', fontWeight: 700 }}>GOOD</span><br/>{stats.good}</div>
            <div><span style={{ color: '#ef4444', fontWeight: 700 }}>MISS</span><br/>{stats.miss}</div>
          </div>
          <p style={{ fontSize: 12, opacity: 0.5 }}>最大コンボ: 🔥{maxCombo}</p>
        </>
      )}
    </div>
  );
}

// SPEND FORM
// ============================================================
function SpendForm({ available, spending, onSpend }) {
  const [confirm, setConfirm] = useState(null); // null | {amount, label}

  const options = [
    { amount: 10000000000, label: "🎁 Amazonギフトカード 1,000円分", desc: "100億円の資産を使用", maxUses: 20 },
    { amount: 50000000000, label: "🍽️ 家族で食事ごちそう 5,000円分", desc: "500億円の資産を使用", maxUses: 10 },
    { amount: 200000000000, label: "🏠 家庭用の家具サポート 20,000円分", desc: "2,000億円の資産を使用", maxUses: 10 },
    { amount: 500000000000, label: "✈️ 国内旅費サポート 50,000円分", desc: "5,000億円の資産を使用", maxUses: 5 },
  ];

  const getUsedCount = (label) => (spending || []).filter(e => e.memo === label).length;

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
      {options.map((opt, i) => {
        const usedCount = getUsedCount(opt.label);
        const atLimit = usedCount >= opt.maxUses;
        const canAfford = available >= opt.amount && !atLimit;
        return (
          <button key={i} disabled={!canAfford}
            onClick={() => setConfirm(opt)}
            style={{
              padding: '16px', borderRadius: 14, textAlign: 'left', cursor: canAfford ? 'pointer' : 'default',
              background: canAfford ? 'linear-gradient(135deg, rgba(236,72,153,0.12), rgba(245,158,11,0.08))' : 'rgba(255,255,255,0.03)',
              border: `1px solid ${canAfford ? 'rgba(236,72,153,0.3)' : 'rgba(255,255,255,0.06)'}`,
              opacity: canAfford ? 1 : 0.4, color: '#fff', transition: 'all 0.2s',
            }}>
            <div style={{ fontSize: 16, fontWeight: 900, marginBottom: 4 }}>{opt.label}</div>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
              <div style={{ fontSize: 11, opacity: 0.5 }}>{opt.desc}</div>
              <div style={{ fontSize: 10, fontWeight: 700, color: atLimit ? '#ef4444' : 'rgba(255,255,255,0.4)' }}>
                {usedCount}/{opt.maxUses}回
              </div>
            </div>
          </button>
        );
      })}

      {confirm && (
        <div style={{ textAlign: 'center', padding: 16, borderRadius: 14, background: 'rgba(236,72,153,0.08)', border: '1px solid rgba(236,72,153,0.25)' }}>
          <div style={{ fontSize: 14, fontWeight: 900, color: '#ec4899', marginBottom: 4 }}>
            {confirm.label}
          </div>
          <div style={{ fontSize: 12, opacity: 0.5, marginBottom: 12 }}>
            資産から {formatYen(confirm.amount)} を使用します
          </div>
          <div style={{ display: 'flex', gap: 8, justifyContent: 'center' }}>
            <button className="btn" onClick={() => { onSpend(confirm.amount, confirm.label); setConfirm(null); }}

            </button>

              onClick={() => setConfirm(null)}>

            </button>
          </div>
        </div>
      )}
    </div>
  );
}

// ============================================================
// COLLECTION VIEW
// ============================================================
function CollectionView({ collection, onSelect }) {
  const [filter, setFilter] = useState("all");
  const all = useMemo(() => {
    const list = [];
    RARITIES.slice().reverse().forEach(r => {
      TYPES.forEach(type => {
        const key = `${type.id}_${r.rank}`;
        const d = MONSTERS[type.id][r.rank - 1];
        const ow = collection[key];
        list.push({ key, typeId: type.id, typeName: type.name, typeEmoji: type.emoji, typeColor: type.color, rank: r.rank, rarity: r, ...d, owned: !!ow, count: ow?.count || 0 });
      });
    });
    return list;
  }, [collection]);
  const shown = filter === "all" ? all : all.filter(m => m.typeId === filter);
  const ownCount = all.filter(m => m.owned).length;
  const totalPwr = Object.values(collection).reduce((s, m) => s + (POWER_VALUES[m.rank - 1] || 0) * (m.count || 0), 0);

  return (
    <div>
      <div className="st">📖 コレクション <span style={{ fontSize: 13, opacity: 0.5 }}>{ownCount}/66</span></div>
      <div style={{ display: 'flex', gap: 8, marginBottom: 12 }}>
        <div style={{ flex: 1, background: 'linear-gradient(180deg, rgba(50,40,80,0.5), rgba(35,28,55,0.6))', border: '1px solid rgba(139,92,246,0.15)', borderRadius: 10, padding: '8px 12px', textAlign: 'center' }}>
          <div style={{ fontSize: 9, opacity: 0.4 }}>総資産</div>
          <div style={{ fontFamily: "'Orbitron',sans-serif", fontSize: 16, fontWeight: 900, color: '#c084fc' }}>{totalPwr.toLocaleString()}</div>
        </div>
        <div style={{ flex: 1, background: 'linear-gradient(180deg, rgba(60,50,30,0.5), rgba(40,35,20,0.6))', border: '1px solid rgba(245,158,11,0.15)', borderRadius: 10, padding: '8px 12px', textAlign: 'center' }}>
          <div style={{ fontSize: 9, opacity: 0.4 }}>総保有数</div>
          <div style={{ fontFamily: "'Orbitron',sans-serif", fontSize: 16, fontWeight: 900, color: '#fbbf24' }}>{Object.values(collection).reduce((s, m) => s + m.count, 0)}</div>
        </div>
      </div>
      <div className="tf2">
        <button className={`tfb ${filter === "all" ? 'act' : ''}`} onClick={() => setFilter("all")}>全て</button>
        {TYPES.map(t => (
          <button key={t.id} className={`tfb ${filter === t.id ? 'act' : ''}`} onClick={() => setFilter(t.id)}>
            {t.emoji}{t.name}
          </button>
        ))}
      </div>
      <div className="cg">
        {shown.map(m => {
          const rkCls = m.owned ? (m.rank >= 11 ? 'rank-diamond' : m.rank === 10 ? 'rank-rainbow' : m.rank === 9 ? 'rank-gold' : m.rank === 8 ? 'rank-silver' : '') : '';
          return (
          <div key={m.key} className={`ci ${!m.owned ? 'un' : ''} ${m.owned && m.rank >= 10 ? 'god' : ''}`}
            style={{ borderColor: m.owned ? m.rarity.color + '60' : 'transparent' }}
            onClick={() => m.owned && onSelect(m)}>
            <div>{m.owned ? m.icon : "❓"}</div>
            {m.owned && m.count > 1 && <div className="ic">×{m.count}</div>}
            <div className={`cn ${rkCls}`} style={{ color: rkCls ? undefined : (m.owned ? m.rarity.color : '#444') }}>
              {m.owned ? m.name : m.rank === 11 ? "★MAX" : `★${m.rank}`}
            </div>
            {m.owned && <div style={{ fontSize: 6, color: '#a78bfa', opacity: 0.7 }}>💰{formatYen(POWER_VALUES[m.rank - 1])}</div>}
          </div>
          );
        })}
      </div>
    </div>
  );
}

// SYNTHESIS VIEW
// ============================================================
function SynthView({ collection, synthResult, onFindCandidates, onSynthSingle, onSynthAll }) {
  const [filter, setFilter] = useState("all");
  const [confirmAll, setConfirmAll] = useState(false);

  const candidates = useMemo(() => onFindCandidates(), [collection, onFindCandidates]);
  const totalSynthable = candidates.reduce((sum, c) => sum + c.synthCount, 0);

  // All owned monsters sorted by type then rank
  const owned = useMemo(() => {
    return Object.entries(collection).map(([k, v]) => ({ key: k, ...v }))
      .sort((a, b) => {
        if (a.rank !== b.rank) return b.rank - a.rank; // レアリティ高い順
        return TYPES.findIndex(t => t.id === a.typeId) - TYPES.findIndex(t => t.id === b.typeId); // 同ランク内は獣→竜→精霊→魔族→神獣
      });
  }, [collection]);

  const shown = filter === "all" ? owned : owned.filter(m => m.typeId === filter);

  return (
    <div>
      {/* Header with gradient */}
      <div style={{ margin: '0 -16px', padding: '20px 16px 16px',
        background: 'linear-gradient(160deg, rgba(60,40,100,0.3) 0%, rgba(40,25,70,0.2) 100%)',
        borderBottom: '1px solid rgba(139,92,246,0.15)', marginBottom: 16 }}>
        <div style={{ fontSize: 18, fontWeight: 900, marginBottom: 4 }}>⚗️ 合成</div>
        <div style={{ fontSize: 11, opacity: 0.4 }}>
          同種族・同ランク: ★1-2=2体, ★3-9=3体 → ランクUP<br/>★10を3体(異種OK) → ★MAXランダム<br/>※各アイテム1個はコレクション用に保持
        </div>
      </div>

      {/* Synth result animation */}
      {synthResult && (
        <div style={{ textAlign: 'center', margin: '16px 0', animation: 'ri 0.4s ease-out',
          background: 'rgba(139,92,246,0.08)', borderRadius: 14, padding: 16 }}>
          {synthResult.batch ? (
            <div style={{ fontSize: 16, fontWeight: 900, color: '#fbbf24' }}>
              ✨ {synthResult.count}件の合成完了！
            </div>
          ) : (
            <div>
              <div style={{ fontSize: 48 }}>{synthResult.icon}</div>
              <div style={{ fontSize: 14, fontWeight: 900, color: synthResult.rarity.color }}>
                {synthResult.name} 獲得！
              </div>
              <div style={{ fontSize: 12, color: synthResult.rarity.color }}>
                {renderStars(synthResult.rank)}
              </div>
            </div>
          )}
        </div>
      )}

      {/* Batch synth button */}
      {totalSynthable > 0 && (
        <div style={{ background: 'linear-gradient(135deg, rgba(245,158,11,0.1), rgba(236,72,153,0.06))',
          border: '1px solid rgba(245,158,11,0.25)', borderRadius: 14, padding: 16, marginBottom: 16, textAlign: 'center' }}>
          <div style={{ fontSize: 13, fontWeight: 700, color: '#fbbf24', marginBottom: 10 }}>
            🔥 合成可能: {totalSynthable}件

            ⚡ 一斉合成（{totalSynthable}件）
          </button>

      {/* Confirmation dialog */}
      {confirmAll && (
        <div className="mo" onClick={() => setConfirmAll(false)}>
          <div className="mc" style={{ borderColor: '#f1c40f' }} onClick={e => e.stopPropagation()}>

            <div style={{ fontSize: 16, fontWeight: 900, color: '#f1c40f', marginBottom: 12 }}>
              一斉合成の確認
            </div>
            <div style={{ fontSize: 12, opacity: 0.7, marginBottom: 8 }}>以下の該当トレジャーを全て合成します：</div>
            <div style={{ maxHeight: 200, overflowY: 'auto', marginBottom: 16, textAlign: 'left' }}>

                  background: 'linear-gradient(135deg, rgba(255,107,129,0.1), rgba(255,215,0,0.06))',

                    <div style={{ fontSize: 8, color: '#ff6b81' }}>計{c.total10}体</div>
                  </div>
                  <div style={{ fontSize: 18, color: '#fbbf24' }}>→</div>
                  <div style={{ textAlign: 'center', minWidth: 56 }}>
                    <div style={{ fontSize: 28 }}>🌟</div>
                    <div className="rank-diamond" style={{ fontSize: 8, fontWeight: 700 }}>★MAX</div>

        )}
      </div>
    </div>
  );
}

  const [rankings, setRankings] = useState([]);

    mathHardAdd: '🧮 上級±', mathHardMult: '✖️ 上級×÷'
  };

  const GAME_TABS = [
    { id: "tap", icon: "👊", name: "連打" },
    { id: "gem", icon: "💎", name: "キャッチ" },
    { id: "timing", icon: "⏱️", name: "タイマー" },
    { id: "tower", icon: "🪙", name: "タワー" },
    { id: "shooting", icon: "🎯", name: "射的" },
    { id: "memory", icon: "🃏", name: "神経衰弱" },
    { id: "bubble", icon: "🫧", name: "バブル" },
    { id: "mathEasy", icon: "➕", name: "初級+" },
    { id: "kuku", icon: "🔢", name: "九九" },
    { id: "mathMid", icon: "📐", name: "中級+" },
    { id: "mathHardAdd", icon: "🧮", name: "上級±" },
    { id: "mathHardMult", icon: "✖️", name: "上級×÷" },
  ];

  useEffect(() => {
    setLoading(true);
    if (window.fbDb) {
      window.fbDb.ref('rankings').once('value').then(snapshot => {
        const entries = [];
        snapshot.forEach(child => {
          const d = child.val();
          if (d && d.name) entries.push(d);
        });
        setRankings(entries);
        setLoading(false);
      }).catch(() => setLoading(false));
    } else {
      setLoading(false);
    }
  }, []);

  const sorted = useMemo(() => {
    return rankings
      .filter(r => (r.playCounts?.[gameTab] || 0) > 0)
      .sort((a, b) => (b.playCounts?.[gameTab] || 0) - (a.playCounts?.[gameTab] || 0));
  }, [rankings, gameTab]);

  const medal = (i) => i === 0 ? "👑" : i === 1 ? "🥈" : i === 2 ? "🥉" : `${i + 1}`;

  return (
    <div>
      <div style={{ margin: '0 -16px', padding: '20px 16px 16px',

        <div style={{ fontSize: 11, opacity: 0.4 }}>みんなのプレイ回数</div>

      {/* Game tabs */}
      <div style={{ display: 'flex', gap: 4, marginBottom: 12, flexWrap: 'wrap' }}>

          <button key={g.id} className={`tfb ${gameTab === g.id ? 'act' : ''}`}

      <div style={{ fontSize: 14, fontWeight: 700, marginBottom: 10, color: '#93c5fd' }}>
        {HISTORY_GAMES[gameTab]}

      {loading ? (
        <div style={{ textAlign: 'center', padding: 40, opacity: 0.4 }}>読み込み中...</div>

        <div style={{ textAlign: 'center', padding: 40, opacity: 0.4 }}>
          <div style={{ fontSize: 40, marginBottom: 12 }}>📋</div>
          <div style={{ fontSize: 13 }}>まだプレイデータがありません</div>
          <div style={{ fontSize: 11, marginTop: 4 }}>ミニゲームをプレイしてセーブすると記録されます</div>
        </div>
      ) : (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
          {sorted.map((s, i) => (
            <div key={i} style={{
              display: 'flex', alignItems: 'center', gap: 10, padding: '12px 14px', borderRadius: 14,
              background: i === 0 ? 'linear-gradient(135deg, rgba(96,165,250,0.12), rgba(96,165,250,0.06))'
                : i === 1 ? 'linear-gradient(135deg, rgba(200,214,229,0.08), rgba(200,214,229,0.03))'
                : i === 2 ? 'linear-gradient(135deg, rgba(205,127,50,0.08), rgba(205,127,50,0.03))'
                : 'rgba(255,255,255,0.04)',

            }}>
              <div style={{ fontSize: i < 3 ? 24 : 14, width: 32, textAlign: 'center', fontWeight: 900,
                color: i >= 3 ? 'rgba(255,255,255,0.3)' : undefined }}>
                {medal(i)}
              </div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 14, fontWeight: 900, color: i === 0 ? '#93c5fd' : '#e0e0e0' }}>{s.name}</div>
              </div>
              <div style={{ fontFamily: "'Orbitron',sans-serif", fontSize: 16, fontWeight: 900, color: '#93c5fd' }}>
                {(s.playCounts?.[gameTab] || 0).toLocaleString()}回
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

    { id: "mathHardMult", icon: "✖️", name: "上級×÷" },
  ];

  const sorted = useMemo(() => {
    const list = [...rankings];
    if (tab === 0) list.sort((a, b) => (b.totalAssets || 0) - (a.totalAssets || 0));
    else if (tab === 1) list.sort((a, b) => (b.colCount || 0) - (a.colCount || 0));
    else if (tab === 2) list.sort((a, b) => (b.totalPulls || 0) - (a.totalPulls || 0));
    else {
      list.sort((a, b) => ((b.bestScores?.[gameTab]) || 0) - ((a.bestScores?.[gameTab]) || 0));
      return list.filter(r => (r.bestScores?.[gameTab] || 0) > 0);
    }
    return list;
  }, [rankings, tab, gameTab]);

  const medal = (i) => i === 0 ? "👑" : i === 1 ? "🥈" : i === 2 ? "🥉" : `${i + 1}`;

  return (
    <div>
      <div style={{ margin: '0 -16px', padding: '20px 16px 16px',
        background: 'linear-gradient(160deg, rgba(255,215,0,0.1) 0%, rgba(139,92,246,0.08) 100%)',
        borderBottom: '1px solid rgba(255,215,0,0.15)', marginBottom: 16 }}>
        <div style={{ fontSize: 18, fontWeight: 900, marginBottom: 4 }}>🏆 ファミリーランキング</div>
        <div style={{ fontSize: 11, opacity: 0.4 }}>セーブ時にランキングが更新されます</div>
      </div>

      {/* Tabs */}
      <div style={{ display: 'flex', gap: 6, marginBottom: 16 }}>
        {tabs.map((t, i) => (
          <button key={i} className={`tfb ${tab === i ? 'act' : ''}`}
            style={{ flex: 1, textAlign: 'center', padding: '8px 4px' }}
            onClick={() => setTab(i)}>
            {t.icon} {t.label}
          </button>
        ))}
      </div>

      {/* Game sub-tabs for minigame ranking */}
      {tab === 3 && (
        <div style={{ display: 'flex', gap: 4, marginBottom: 12, flexWrap: 'wrap' }}>
          {GAME_TABS.map(g => (
            <button key={g.id} className={`tfb ${gameTab === g.id ? 'act' : ''}`}
              style={{ padding: '4px 8px', fontSize: 10 }}
              onClick={() => setGameTab(g.id)}>
              {g.icon}{g.name}
            </button>
          ))}
        </div>
      )}

      {loading ? (
        <div style={{ textAlign: 'center', padding: 40, opacity: 0.4 }}>読み込み中...</div>
      ) : sorted.length === 0 ? (
        <div style={{ textAlign: 'center', padding: 40, opacity: 0.4 }}>
          <div style={{ fontSize: 40, marginBottom: 12 }}>🏆</div>
          <div style={{ fontSize: 13 }}>まだランキングデータがありません</div>
          <div style={{ fontSize: 11, marginTop: 4 }}>ニックネームを設定してセーブすると登録されます</div>
        </div>
      ) : (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
          {sorted.map((r, i) => (
            <div key={r.name + i} style={{
              display: 'flex', alignItems: 'center', gap: 10, padding: '12px 14px', borderRadius: 14,
              background: i === 0 ? 'linear-gradient(135deg, rgba(255,215,0,0.12), rgba(245,158,11,0.06))'
                : i === 1 ? 'linear-gradient(135deg, rgba(200,214,229,0.08), rgba(200,214,229,0.03))'
                : i === 2 ? 'linear-gradient(135deg, rgba(205,127,50,0.08), rgba(205,127,50,0.03))'
                : 'rgba(255,255,255,0.04)',
              border: `1px solid ${i === 0 ? 'rgba(255,215,0,0.25)' : i < 3 ? 'rgba(200,214,229,0.15)' : 'rgba(255,255,255,0.06)'}`,
            }}>
              <div style={{ fontSize: i < 3 ? 24 : 14, width: 32, textAlign: 'center', fontWeight: 900,
                color: i >= 3 ? 'rgba(255,255,255,0.3)' : undefined }}>
                {medal(i)}
              </div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 14, fontWeight: 900, color: i === 0 ? '#fbbf24' : '#e0e0e0' }}>{r.name}</div>
                <div style={{ fontSize: 11, opacity: 0.5, display: 'flex', gap: 8 }}>
                  <span>💰{formatYen(r.totalAssets || 0)}</span>
                  <span>📖{r.colCount || 0}/66</span>
                </div>
              </div>
              <div style={{ textAlign: 'right' }}>
                {tab === 0 && (
                  <div style={{ fontFamily: "'Orbitron',sans-serif", fontSize: 12, fontWeight: 900, color: '#fbbf24' }}>
                    {formatYen(r.totalAssets || 0)}
                  </div>
                )}
                {tab === 1 && (
                  <div style={{ fontFamily: "'Orbitron',sans-serif", fontSize: 14, fontWeight: 900, color: '#c084fc' }}>
                    {r.colCount || 0}<span style={{ fontSize: 10, opacity: 0.5 }}>/66</span>
                  </div>
                )}
                {tab === 2 && (
                  <div style={{ fontFamily: "'Orbitron',sans-serif", fontSize: 14, fontWeight: 900, color: '#ec4899' }}>
                    🎰{(r.totalPulls || 0).toLocaleString()}回
                  </div>
                )}
                {tab === 3 && (
                  <div style={{ fontFamily: "'Orbitron',sans-serif", fontSize: 14, fontWeight: 900, color: '#fbbf24' }}>
                    🪙{r.bestScores?.[gameTab] || 0}
                  </div>
                )}
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(MonsterGacha));
  </script>
</body>
</html>
